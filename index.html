<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela Login</title>
    <link rel="stylesheet" href="src/style/index.css">
</head>

<body>
    <div class="container">
        <div class="logon">
            <h1>Login</h1>

            <form id="loginForm">
                <label for="name">Usuário</label>
                <input type="text" name="Tname" id="name" required>
                <br>
                <label for="Senha">Senha</label>
                <input type="password" name="Psenha" id="Senha" required>
                <p><a href="#">Esqueceu a Senha?</a></p>

                <!-- O botão agora apenas dispara o evento de submit -->
                <input type="submit" name="entrar" id="Entrar" value="Entrar">

                <div class="img">
                    <img src="src/utils/images/image senai.png" alt="imagem senai" width="30px" height="30px">
                </div>
            </form>
        </div>
        <div class="image">
            <img src="src/utils/images/unnamed.png" alt="Imagem Senai">
        </div>
    </div>
</body>
<script src="src/script/login.js?v=2"></script>

</html>
