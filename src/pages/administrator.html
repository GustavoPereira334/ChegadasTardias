<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administração</title>
</head>
<link rel="stylesheet" href="../style/adm.css">

<body>
    <div class="container">
        <h3>Registros Gerais</h3>
        <!-- Filtros -->
        <div class="filters-container">
            <input type="search" placeholder="Buscar...">
            <select id="areaBox">
                <option value="todasTurmas">Todas turmas</option>
            </select>
        </div>
        <!-- Cards de Contadores -->
        <div class="cards-container">
            <div class="card">
                <span class="card-value" id="totalAtrasos">0</span>
                <span class="card-label">Total de atrasos</span>
            </div>
            <div class="card">
                <span class="card-value" id="turmasAfetadas">0</span>
                <span class="card-label">Turmas afetadas</span>
            </div>
            <div class="card">
                <span class="card-value" id="perdeuHora">0</span>
                <span class="card-label">Perdeu a hora</span>
            </div>
        </div>
        <table class="table-info">
            <thead>
                <tr>
                    <th>HORA</th>
                    <th>ALUNO</th>
                    <th>TURMA</th>
                    <th>MOTIVO</th>
                    <th></th>
                </tr>
            </thead>
            <tbody id="tabelaCorpo">
            </tbody>
        </table>
    </div>
</body>

</html>
